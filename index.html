
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iemes32 bio</title>
    <link rel="icon" id="favicon" href="" type="image/png" />
    <style>
        /* ---------- ЭКРАН ЗАГРУЗКИ (ПРИВЕТ КТО ЭТОТ КОД ЧИТАЕТ, СДЕСЬ 99% ИИ, ТУТ НЕЧЕГО ИНТЕРЕСТНОГО НЕТУ) ---------- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #002b44, #0e1419 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-title {
            font-size: 28px;
            font-weight: 300;
            color: #e0f0fa;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(43, 161, 203, 0.3);
        }
        .progress-container {
            width: 280px;
            max-width: 80%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            height: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ba1cb, #5c6873);
            border-radius: 40px;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(43, 161, 203, 0.4);
        }
        .progress-text {
            margin-top: 14px;
            font-size: 16px;
            color: #9bb7c9;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .loader-enter-btn {
            margin-top: 35px;
            padding: 12px 48px;
            background: rgba(43, 161, 203, 0.2);
            border: 1px solid #2ba1cb;
            border-radius: 60px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            box-shadow: 0 0 30px rgba(43, 161, 203, 0.1);
        }
        .loader-enter-btn.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .loader-enter-btn:hover {
            background: rgba(43, 161, 203, 0.4);
            box-shadow: 0 0 50px rgba(43, 161, 203, 0.3);
            transform: scale(1.05);
        }

        /* ---------- ОБЩИЕ СТИЛИ ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 30% 30%, #002b44, #0e1419 80%);
            color: #fff;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% { background: radial-gradient(circle at 20% 20%, #002b44, #0e1419 80%); }
            100% { background: radial-gradient(circle at 80% 80%, #003b5c, #0a1a22 80%); }
        }

        /* ---------- ЧАСТИЦЫ ---------- */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(43, 161, 203, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 15px #2ba1cb;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ---------- ЗВЁЗДЫ ---------- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* ---------- КАРТОЧКА ---------- */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(14, 25, 29, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 161, 203, 0.3);
            border-radius: 32px;
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 43, 68, 0.8), 0 0 40px rgba(43, 161, 203, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: glowPulse 4s ease-in-out infinite alternate;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 20px 60px rgba(0, 43, 68, 0.8), 0 0 40px rgba(43, 161, 203, 0.2); }
            100% { box-shadow: 0 30px 80px rgba(0, 43, 68, 0.9), 0 0 70px rgba(43, 161, 203, 0.4); }
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 43, 68, 0.9), 0 0 60px rgba(43, 161, 203, 0.3);
        }

        /* ---------- АВАТАР ---------- */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
            border: 3px solid #2ba1cb;
            box-shadow: 0 0 30px rgba(43, 161, 203, 0.5), inset 0 0 20px rgba(43, 161, 203, 0.2);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            animation: pulseBorder 3s ease-in-out infinite;
        }
        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(43, 161, 203, 0.8), inset 0 0 30px rgba(43, 161, 203, 0.4);
        }
        @keyframes pulseBorder {
            0%, 100% { box-shadow: 0 0 20px rgba(43, 161, 203, 0.4), inset 0 0 10px rgba(43, 161, 203, 0.1); }
            50% { box-shadow: 0 0 50px rgba(43, 161, 203, 0.8), inset 0 0 30px rgba(43, 161, 203, 0.3); }
        }

        /* ---------- ТЕКСТ ---------- */
        .name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #ffffff, #2ba1cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        .title {
            font-size: 16px;
            color: #9bb7c9;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 300;
            border-bottom: 1px solid rgba(43, 161, 203, 0.2);
            padding-bottom: 15px;
        }

        /* ---------- ВКЛАДКИ ---------- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 24px;
            background: rgba(43, 161, 203, 0.08);
            border: 1px solid rgba(43, 161, 203, 0.2);
            border-radius: 40px;
            color: #9bb7c9;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .tab-btn:hover {
            background: rgba(43, 161, 203, 0.15);
            border-color: #2ba1cb;
            color: #fff;
        }
        .tab-btn.active {
            background: rgba(43, 161, 203, 0.2);
            border-color: #2ba1cb;
            color: #fff;
            box-shadow: 0 0 20px rgba(43, 161, 203, 0.2);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- ПРОЕКТЫ ---------- */
        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 10px;
        }
        @media (min-width: 500px) {
            .projects-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .project-card {
            background: rgba(0, 43, 68, 0.3);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(43, 161, 203, 0.15);
            transition: all 0.3s ease;
            text-align: left;
        }
        .project-card:hover {
            border-color: rgba(43, 161, 203, 0.4);
            box-shadow: 0 0 30px rgba(43, 161, 203, 0.1);
            transform: translateY(-4px);
        }
        .project-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(43, 161, 203, 0.1);
        }
        .project-card h4 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 4px;
        }
        .project-card .project-desc {
            font-size: 14px;
            color: #c8dde8;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .project-card a {
            color: #2ba1cb;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s;
        }
        .project-card a:hover {
            color: #3fc3f0;
            text-decoration: underline;
        }

        /* ---------- СОЦСЕТИ ---------- */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0 20px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 22px;
            border-radius: 60px;
            background: rgba(43, 161, 203, 0.08);
            border: 1px solid rgba(43, 161, 203, 0.25);
            color: #e0f0fa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            min-width: 90px;
            cursor: pointer;
        }
        .social-link:hover {
            background: rgba(43, 161, 203, 0.2);
            border-color: #2ba1cb;
            box-shadow: 0 0 30px rgba(43, 161, 203, 0.3);
            transform: translateY(-3px) scale(1.03);
            color: #ffffff;
        }
        .social-link .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }
        .social-link .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ---------- УПРАВЛЕНИЕ ЗВУКОМ ---------- */
        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
        }
        .audio-controls button {
            background: rgba(43, 161, 203, 0.15);
            border: 1px solid rgba(43, 161, 203, 0.3);
            color: #e0f0fa;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .audio-controls button:hover {
            background: rgba(43, 161, 203, 0.3);
            box-shadow: 0 0 20px rgba(43, 161, 203, 0.2);
        }
        .audio-controls input[type="range"] {
            -webkit-appearance: none;
            background: rgba(43, 161, 203, 0.2);
            height: 4px;
            border-radius: 2px;
            outline: none;
            width: 100px;
            transition: background 0.3s;
        }
        .audio-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2ba1cb;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(43, 161, 203, 0.5);
        }
        .audio-controls input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #2ba1cb;
            cursor: pointer;
        }
        .audio-status {
            font-size: 13px;
            color: #9bb7c9;
            min-width: 40px;
        }

        /* ---------- "Обо мне" ---------- */
        .about-section {
            padding: 12px 10px;
            border-radius: 20px;
            background: rgba(0, 43, 68, 0.25);
            border: 1px solid rgba(43, 161, 203, 0.1);
        }
        .about-title {
            font-size: 18px;
            font-weight: 600;
            color: #2ba1cb;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(43, 161, 203, 0.3);
        }
        .about-media {
            width: 100%;
            border-radius: 14px;
            margin: 8px 0 12px;
            max-height: 260px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(43, 161, 203, 0.15);
        }
        .about-text {
            font-size: 15px;
            line-height: 1.6;
            color: #c8dde8;
            text-align: left;
        }

        /* ---------- МОДАЛЬНОЕ ОКНО ---------- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: rgba(14, 25, 29, 0.95);
            border: 1px solid #2ba1cb;
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(43, 161, 203, 0.3);
            position: relative;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            background: none;
            border: none;
            color: #9bb7c9;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10;
        }
        .modal-close:hover { color: #fff; }
        .modal-title {
            font-size: 22px;
            font-weight: 600;
            color: #2ba1cb;
            margin-bottom: 18px;
            text-align: center;
            text-shadow: 0 0 20px rgba(43, 161, 203, 0.3);
        }
        .modal-body {
            color: #c8dde8;
            font-size: 14px;
            line-height: 1.7;
            text-align: left;
        }
        .modal-body .data-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(43, 161, 203, 0.08);
        }
        .modal-body .data-item .label {
            color: #9bb7c9;
            padding-right: 15px;
        }
        .modal-body .data-item .value {
            color: #fff;
            font-weight: 500;
            text-align: right;
            word-break: break-word;
            max-width: 60%;
        }
        .modal-body .data-item .value.highlight {
            color: #2ba1cb;
        }

        /* ---------- COOKIE ---------- */
        .cookie-banner {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(14, 25, 29, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 161, 203, 0.3);
            border-radius: 20px;
            padding: 18px 28px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.5s ease;
            display: none;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(30px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .cookie-banner p {
            font-size: 15px;
            color: #e0f0fa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .cookie-banner .cookie-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .cookie-banner button {
            padding: 8px 28px;
            border-radius: 40px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .cookie-banner .btn-yes {
            background: #2ba1cb;
            color: #0e1419;
        }
        .cookie-banner .btn-yes:hover {
            background: #3fc3f0;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(43, 161, 203, 0.4);
        }
        .cookie-banner .btn-absolutely {
            background: #5c6873;
            color: #fff;
        }
        .cookie-banner .btn-absolutely:hover {
            background: #7a8a97;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(92, 104, 115, 0.4);
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 500px) {
            .card { padding: 24px 18px; }
            .avatar { width: 100px; height: 100px; }
            .name { font-size: 24px; }
            .social-link { padding: 8px 14px; font-size: 13px; min-width: 70px; }
            .socials { gap: 10px; }
            .tabs { gap: 8px; }
            .tab-btn { padding: 6px 16px; font-size: 13px; }
            .audio-controls input[type="range"] { width: 70px; }
            .modal-box { padding: 20px 15px; }
            .modal-body .data-item { flex-direction: column; align-items: flex-start; gap: 2px; }
            .modal-body .data-item .value { text-align: left; max-width: 100%; }
            .cookie-banner { padding: 15px 18px; }
            .projects-grid { grid-template-columns: 1fr; }
            .loader-title { font-size: 22px; }
        }
        #bg-music { display: none; }
    </style>
</head>
<body>

    <!-- ===== ЭКРАН ЗАГРУЗКИ ===== -->
    <div id="loader">
        <div class="loader-title">✦ iemes32 ✦</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0%</div>
        <button class="loader-enter-btn" id="enterBtn">Войти</button>
    </div>

    <!-- ===== ФОН: ЧАСТИЦЫ + ЗВЁЗДЫ ===== -->
    <div class="particles" id="particles"></div>
    <div class="stars" id="stars"></div>

    <!-- ===== ОСНОВНАЯ КАРТОЧКА ===== -->
    <div class="card" id="app">

        <img class="avatar" id="avatar" alt="Аватар" />
        <div class="name" id="name"></div>
        <div class="title" id="title"></div>

        <!-- Соцсети -->
        <div class="socials" id="socials"></div>

        <!-- Управление звуком -->
        <div class="audio-controls">
            <button id="muteBtn">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.35" />
            <span class="audio-status" id="volumeStatus">35%</span>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="about">Обо мне</button>
            <button class="tab-btn" data-tab="projects">Мои проекты</button>
        </div>

        <!-- Контент: Обо мне -->
        <div class="tab-content active" id="tab-about">
            <div class="about-section">
                <div class="about-title" id="aboutTitle"></div>
                <div id="aboutMediaContainer"></div>
                <div class="about-text" id="aboutText"></div>
            </div>
        </div>

        <!-- Контент: Проекты -->
        <div class="tab-content" id="tab-projects">
            <div class="projects-grid" id="projectsGrid"></div>
        </div>

    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <button class="modal-close" id="modalClose">&times;</button>
            <div class="modal-title">📡 Данные о вашем ПК</div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- ===== COOKIE БАННЕР ===== -->
    <div class="cookie-banner" id="cookieBanner">
        <p>🍪 Вы согласны отдать все ваши cookie?</p>
        <div class="cookie-buttons">
            <button class="btn-yes" id="cookieYes">Да</button>
            <button class="btn-absolutely" id="cookieAbsolutely">КОНЧЕНО ДА</button>
        </div>
    </div>

    <!-- ===== АУДИО ===== -->
    <audio id="bg-music" loop></audio>

    <!-- ============================================================ -->
    <!-- ===== ВСЕ НАСТРОЙКИ – МЕНЯЙТЕ ТОЛЬКО ЭТОТ БЛОК ===== -->
    <script>
        // -----------------------------------------------------------------
        //  КОНФИГУРАЦИЯ САЙТА
        // -----------------------------------------------------------------
        const CONFIG = {
            name: 'iemes32',
            title: '✦ Ку 👋 ✦',
            avatar: 'https://github.com/iemes32/iemes32.github.io/blob/main/ava.png?raw=true',
            music: 'https://github.com/iemes32/iemes32.github.io/raw/refs/heads/main/Dane%20Whisper%20-%20Planet%20V.mp3',
            backgroundImage: '',

            socials: [
                {
                    name: 'Telegram',
                    url: '#',
                    icon: '<img src="https://github.com/iemes32/iemes32.github.io/blob/main/telegram_tile_logo_icon_169640.ico?raw=true" alt="Telegram">'
                },
                {
                    name: 'Discord',
                    url: 'https://discord.com/users/1118893105647718412',
                    icon: '<img src="https://github.com/iemes32/iemes32.github.io/blob/main/discord_macos_bigsur_icon_190238.ico?raw=true" alt="Discord">'
                },
                {
                    name: 'Steam',
                    url: 'https://steamcommunity.com/id/iemes32/',
                    icon: '<img src="https://steamcommunity.com/favicon.ico" alt="Steam">'
                }
            ],

            about: {
                title: 'Об мне',
                text: 'Похуй, потом напишу',
                media: 'https://github.com/iemes32/iemes32.github.io/blob/main/photo1.jpg?raw=true'
            },

            // ---------- ПРОЕКТЫ ----------
            projects: [
              //  {
              //      title: 'Мой первый проект',
               //     description: 'Крутой проект, который я сделал на коленке.',
               //     link: 'https://github.com/iemes32/project1',
                //    image: '' // можно оставить пустым, тогда не будет картинки
              //  },
                {
                    title: 'Сайт-визитка',
                    description: 'Личная сайт-визитка и по совместительству первый публичный проект. Да, 99% я использовал ИИшку но кого это вообще волнует. ',
                    link: 'https://iemes32.github.io',

    <!-- ===== СКРИПТЫ ===== -->
    <script>
        (function() {
            'use strict';

            const c = CONFIG;

            // ---------- 0. FAVICON ----------
            document.getElementById('favicon').href = c.avatar;

            // ---------- 1. ЗВЁЗДЫ ----------
            (function createStars() {
                const container = document.getElementById('stars');
                for (let i = 0; i < 80; i++) {
                    const star = document.createElement('div');
                    star.classList.add('star');
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = (Math.random() * 3 + 1) + 'px';
                    star.style.height = star.style.width;
                    star.style.animationDelay = Math.random() * 5 + 's';
                    star.style.animationDuration = (Math.random() * 4 + 2) + 's';
                    container.appendChild(star);
                }
            })();

            // ---------- 2. ЗАПОЛНЕНИЕ ДАННЫХ ----------
            document.getElementById('name').textContent = c.name;
            document.getElementById('title').textContent = c.title;

            const avatarEl = document.getElementById('avatar');
            avatarEl.src = c.avatar;
            avatarEl.alt = 'Аватар ' + c.name;

            // Соцсети
            const socialsContainer = document.getElementById('socials');
            socialsContainer.innerHTML = '';
            c.socials.forEach(s => {
                const a = document.createElement('a');
                a.className = 'social-link';
                if (s.name === 'Telegram') {
                    a.href = 'javascript:void(0)';
                    a.addEventListener('click', (e) => {
                        e.preventDefault();
                        showModal();
                    });
                } else {
                    a.href = s.url;
                    a.target = '_blank';
                }
                a.innerHTML = `<span class="icon">${s.icon}</span> ${s.name}`;
                socialsContainer.appendChild(a);
            });

            // Обо мне
            const about = c.about;
            document.getElementById('aboutTitle').textContent = about.title;
            document.getElementById('aboutText').innerHTML = about.text;
            const mediaContainer = document.getElementById('aboutMediaContainer');
            mediaContainer.innerHTML = '';
            if (about.media && about.media.trim() !== '') {
                const url = about.media.trim();
                const ext = url.split('.').pop().toLowerCase();
                const videoExts = ['mp4', 'webm', 'ogg', 'mov'];
                let el;
                if (videoExts.includes(ext)) {
                    el = document.createElement('video');
                    el.src = url;
                    el.controls = true;
                    el.loop = true;
                    el.muted = true;
                    el.className = 'about-media';
                } else {
                    el = document.createElement('img');
                    el.src = url;
                    el.alt = 'Фото';
                    el.className = 'about-media';
                }
                mediaContainer.appendChild(el);
            }

            // Проекты
            const projectsGrid = document.getElementById('projectsGrid');
            projectsGrid.innerHTML = '';
            if (c.projects && c.projects.length > 0) {
                c.projects.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    let imgHtml = '';
                    if (p.image && p.image.trim() !== '') {
                        imgHtml = `<img src="${p.image}" alt="${p.title}" />`;
                    }
                    card.innerHTML = `
                        ${imgHtml}
                        <h4>${p.title}</h4>
                        <div class="project-desc">${p.description || ''}</div>
                        ${p.link ? `<a href="${p.link}" target="_blank">Перейти →</a>` : ''}
                    `;
                    projectsGrid.appendChild(card);
                });
            } else {
                projectsGrid.innerHTML = '<p style="color:#9bb7c9; text-align:center;">Пока нет проектов</p>';
            }

            // ---------- 3. МУЗЫКА (подготовка) ----------
            const audio = document.getElementById('bg-music');
            let isMuted = false;
            let currentVolume = 0.35;

            if (c.music && c.music.trim() !== '') {
                audio.src = c.music;
                audio.volume = currentVolume;
            }

            // ---------- 4. УПРАВЛЕНИЕ ЗВУКОМ ----------
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeStatus = document.getElementById('volumeStatus');

            function updateMuteUI() {
                muteBtn.textContent = isMuted ? '🔇' : '🔊';
                audio.muted = isMuted;
                const vol = isMuted ? 0 : audio.volume;
                volumeStatus.textContent = Math.round(vol * 100) + '%';
                if (!isMuted) volumeSlider.value = vol;
            }

            muteBtn.addEventListener('click', function() {
                isMuted = !isMuted;
                if (isMuted) {
                    audio.muted = true;
                } else {
                    audio.muted = false;
                    audio.volume = currentVolume;
                    volumeSlider.value = currentVolume;
                }
                updateMuteUI();
            });

            volumeSlider.addEventListener('input', function() {
                let val = parseFloat(this.value);
                currentVolume = val;
                if (!isMuted) {
                    audio.volume = val;
                }
                volumeStatus.textContent = Math.round(val * 100) + '%';
                if (isMuted && val > 0) {
                    isMuted = false;
                    audio.muted = false;
                    audio.volume = val;
                    updateMuteUI();
                } else if (val === 0) {
                    isMuted = true;
                    audio.muted = true;
                    updateMuteUI();
                }
            });
            volumeSlider.value = currentVolume;
            volumeStatus.textContent = '35%';

            // ---------- 5. МОДАЛЬНОЕ ОКНО ----------
            const modalOverlay = document.getElementById('modalOverlay');
            const modalBody = document.getElementById('modalBody');
            const modalClose = document.getElementById('modalClose');

            async function getRealIP() {
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    return data.ip;
                } catch { return 'не определен'; }
            }

            function getOS(ua) {
                if (ua.indexOf('Windows') !== -1) return 'Windows';
                if (ua.indexOf('Mac OS') !== -1) return 'macOS';
                if (ua.indexOf('Linux') !== -1) return 'Linux';
                if (ua.indexOf('Android') !== -1) return 'Android';
                if (ua.indexOf('iOS') !== -1) return 'iOS';
                return 'Unknown';
            }

            function getBrowser(ua) {
                if (ua.indexOf('Firefox') !== -1) return 'Firefox';
                if (ua.indexOf('Chrome') !== -1 && ua.indexOf('Edg') === -1) return 'Chrome';
                if (ua.indexOf('Safari') !== -1 && ua.indexOf('Chrome') === -1) return 'Safari';
                if (ua.indexOf('Edg') !== -1) return 'Edge';
                if (ua.indexOf('Opera') !== -1 || ua.indexOf('OPR') !== -1) return 'Opera';
                return 'Unknown';
            }

            function getBrowserVersion(ua) {
                const match = ua.match(/(Chrome|Firefox|Safari|Edg|OPR)\/(\d+\.\d+)/);
                return match ? match[2] : '?';
            }

            async function showModal() {
                const ua = navigator.userAgent;
                const os = getOS(ua);
                const browser = getBrowser(ua);
                const browserVer = getBrowserVersion(ua);
                const ip = await getRealIP();

                const data = {
                    'IP-адрес': ip,
                    'Браузер': `${browser} ${browserVer}`,
                    'Операционная система': os,
                    'Платформа': navigator.platform,
                    'Язык': navigator.language,
                    'Часовой пояс': Intl.DateTimeFormat().resolvedOptions().timeZone,
                    'Cookies включены': navigator.cookieEnabled ? 'Да' : 'Нет',
                    'Онлайн': navigator.onLine ? 'Да' : 'Нет',
                    'Разрешение экрана': `${window.screen.width}×${window.screen.height}`,
                    'Доступная область': `${window.screen.availWidth}×${window.screen.availHeight}`,
                    'Глубина цвета': window.screen.colorDepth + ' бит',
                    'Память устройства': navigator.deviceMemory ? navigator.deviceMemory + ' ГБ' : 'не известно',
                    'Ядер процессора': navigator.hardwareConcurrency || 'не известно',
                    'Тип сети': navigator.connection ? navigator.connection.effectiveType : 'не известно',
                    'User-Agent': ua,
                    'Дата и время': new Date().toLocaleString(),
                    'Ваш любимый цвет': ['#2ba1cb', '#5c6873', '#002b44', '#ff6b6b', '#feca57'][Math.floor(Math.random() * 5)],
                    'Скорость интернета': (Math.random() * 100 + 20).toFixed(1) + ' Мбит/с (приблизительно)'
                };

                let html = '';
                for (let key in data) {
                    let value = data[key];
                    let cls = (key === 'IP-адрес' || key === 'Ваш любимый цвет') ? 'highlight' : '';
                    html += `<div class="data-item"><span class="label">${key}</span><span class="value ${cls}">${value}</span></div>`;
                }
                modalBody.innerHTML = html;
                modalOverlay.classList.add('active');
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
            }
            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal(); });

            // ---------- 6. НОВЫЙ ЗАГРУЗЧИК С ПРОГРЕССОМ И КНОПКОЙ ----------
            const loader = document.getElementById('loader');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const enterBtn = document.getElementById('enterBtn');

            let progress = 0;
            let intervalId = null;
            let loaderHidden = false;

            // Имитация прогресса до 90% (остальные 10% дождёмся реальной загрузки)
            function simulateProgress() {
                intervalId = setInterval(() => {
                    if (progress < 90) {
                        progress += Math.floor(Math.random() * 6) + 2; // +2..7%
                        if (progress > 90) progress = 90;
                        updateProgress(progress);
                    } else {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                }, 200);
            }

            function updateProgress(value) {
                const clamped = Math.min(100, Math.max(0, value));
                progressBar.style.width = clamped + '%';
                progressText.textContent = clamped + '%';
                if (clamped >= 100) {
                    enableEnterButton();
                }
            }

            function enableEnterButton() {
                enterBtn.classList.add('active');
            }

            // Функция, вызываемая по нажатию "Войти"
            function enterSite() {
                if (loaderHidden) return;
                loaderHidden = true;
                // Скрываем загрузчик
                loader.classList.add('hidden');
                // Запускаем музыку (это действие пользователя)
                if (audio.src) {
                    audio.play().catch(() => {});
                }
                // Показываем cookie-баннер через 3 сек
                setTimeout(showCookieBanner, 3000);
            }

            // Событие "load" – когда все ресурсы загружены
            window.addEventListener('load', function() {
                // Останавливаем имитацию, если она ещё идёт
                if (intervalId) {
                    clearInterval(intervalId);
                    intervalId = null;
                }
                // Добиваем до 100%
                progress = 100;
                updateProgress(100);
                // Кнопка уже активна (если не была)
                enableEnterButton();
            });

            // Если по каким-то причинам load не сработает, сделаем запасной таймер на 10 секунд
            setTimeout(() => {
                if (progress < 100) {
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                    progress = 100;
                    updateProgress(100);
                }
            }, 10000);

            // Запускаем имитацию прогресса
            simulateProgress();

            // Назначаем обработчик на кнопку "Войти"
            enterBtn.addEventListener('click', enterSite);

            // ---------- 7. ПЛАШКА COOKIE ----------
            const cookieBanner = document.getElementById('cookieBanner');
            const cookieYes = document.getElementById('cookieYes');
            const cookieAbsolutely = document.getElementById('cookieAbsolutely');

            function showCookieBanner() {
                if (localStorage.getItem('cookieConsent') === 'true') return;
                cookieBanner.style.display = 'block';
            }

            function acceptCookies() {
                localStorage.setItem('cookieConsent', 'true');
                cookieBanner.style.display = 'none';
            }
            cookieYes.addEventListener('click', acceptCookies);
            cookieAbsolutely.addEventListener('click', acceptCookies);

            // ---------- 8. ВКЛАДКИ ----------
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = {
                about: document.getElementById('tab-about'),
                projects: document.getElementById('tab-projects')
            };

            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const target = this.dataset.tab;
                    // Убираем активный класс у всех кнопок и контента
                    tabBtns.forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                    // Активируем нужные
                    this.classList.add('active');
                    if (tabContents[target]) tabContents[target].classList.add('active');
                });
            });

            // ---------- 9. ФОН ----------
            if (c.backgroundImage && c.backgroundImage.trim() !== '') {
                document.body.style.background = `url("${c.backgroundImage}") center/cover no-repeat fixed, #0e1419`;
            }

            // ---------- 10. ЧАСТИЦЫ ----------
            (function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 55; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 9 + 3;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
                    particle.style.animationDelay = (Math.random() * 10) + 's';
                    particle.style.opacity = Math.random() * 0.5 + 0.2;
                    container.appendChild(particle);
                }
            })();

        })();
    </script>

</body>
